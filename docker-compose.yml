version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"


    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-true}
    networks:
      - cinereserve-net
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: cinereserve_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cinereserve_db}
    ports:
      - "5433:5432"
    volumes:
      - cinereserve_pg_data:/var/lib/postgresql/data
    networks:
      - cinereserve-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cinereserve_redis
    ports:
      - "6380:6379"
    volumes:
      - cinereserve_redis_data:/data
    networks:
      - cinereserve-net
    restart: always
    command: redis-server --bind 0.0.0.0 --appendonly yes

volumes:
  cinereserve_pg_data:
  cinereserve_redis_data:

networks:
  cinereserve-net:
    driver: bridge
