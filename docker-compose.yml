version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cinereserve_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cinereserve_db}
    ports:
      - "5433:5432"
    volumes:
      - cinereserve_pg_data:/var/lib/postgresql/data
    networks:
      - cinereserve-net
    restart: always

  redis:
    image: redis:7-alpine
    container_name: cinereserve_redis
    ports:
      - "6380:6379"
    volumes:
      - cinereserve_redis_data:/data
    networks:
      - cinereserve-net
    restart: always
    command: redis-server --bind 0.0.0.0 --appendonly yes

volumes:
  cinereserve_pg_data:
  cinereserve_redis_data:

networks:
  cinereserve-net:
    driver: bridge
